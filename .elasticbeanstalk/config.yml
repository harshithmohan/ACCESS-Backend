branch-defaults:
  master:
    environment: SmartLock-env-1
environment-defaults:
  SmartLock-env-1:
    branch: null
    repository: null
global:
  application_name: Smart Lock
  default_ec2_keyname: ec2-ubuntu
  default_platform: arn:aws:elasticbeanstalk:ap-south-1::platform/Python 3.6 running
    on 64bit Amazon Linux/2.9.4
  default_region: ap-south-1
  include_git_submodules: true
  instance_profile: null
  platform_name: null
  platform_version: null
  profile: eb-cli
  sc: git
  workspace_type: Application
